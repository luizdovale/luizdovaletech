  <meta name="twitter:image" content="https://luizdovaletech.vercel.app/og-image.png" />

  <!-- ======================= -->

  <!-- ======================= -->
  <!--      FAVICONS           -->
  <!-- ======================= -->
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="manifest" href="/manifest.json?v=2" />

  <meta name="theme-color" content="#090B11" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            tech: {
              dark: '#090B11',
              blue: '#131927',
              electric: '#0A84FF',
              gold: '#F5D142',
              gray: '#94A3B8',
              surface: '#0F172A'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          backgroundImage: {
            'tech-gradient': 'linear-gradient(135deg, #0A84FF 0%, #5EADFF 100%)',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          },
          animation: {
            'fadeIn': 'fadeIn 0.3s ease-out forwards',
            'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      background-color: #090B11;
      color: #F8FAFC;
      overflow-x: hidden;
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      -webkit-font-smoothing: antialiased;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    .text-glow {
      text-shadow: 0 0 15px rgba(245, 209, 66, 0.3);
    }
    .text-glow-blue {
      text-shadow: 0 0 20px rgba(10, 132, 255, 0.4);
    }

    /* Scrollbar Premium */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #090B11; }
    ::-webkit-scrollbar-thumb {
      background: #1E293B;
      border-radius: 10px;
      border: 3px solid #090B11;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #0A84FF;
    }

    ::selection {
      background: #0A84FF;
      color: white;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",

      "vite": "https://aistudiocdn.com/vite@^7.2.4",
      "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
      "react/": "https://aistudiocdn.com/react@^19.2.0/",
      "react": "https://aistudiocdn.com/react@^19.2.0",
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
      "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6"
    }
  }
  </script>
</head>

  <div id="root"></div>

</body>
